                "items": [
                  {
                    "product_id": 1,
                    "name": "قهوة ممتازة",
                    "price": 25.00,
                    "quantity": 2,
                    "subtotal": 50.00,
                    "image_url": "https://example.com/images/coffee.jpg"
                  }
                ],
                "count": 2
              },
              "summary": {
                "subtotal": 50.00,
                "tax": 5.00,
                "shipping": 10.00,
                "total": 65.00
              },
              "is_guest": false
            }
          }
        headers: []
        description: Success
    responseFields: []
    auth: []
    controller: null
    method: null
    route: null
