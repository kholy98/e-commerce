name: Categories
description: |-

  APIs for browsing and managing product categories.

  Public endpoints for listing and viewing categories do not require authentication.
  Admin endpoints for creating, updating, and deleting categories require authentication.
endpoints:
  -
    custom: []
    httpMethods:
      - GET
    uri: api/categories
    metadata:
      custom: []
      groupName: Categories
      groupDescription: |-

        APIs for browsing and managing product categories.

        Public endpoints for listing and viewing categories do not require authentication.
        Admin endpoints for creating, updating, and deleting categories require authentication.
      subgroup: ''
      subgroupDescription: ''
      title: 'List all categories'
      description: |-
        Get a paginated list of all active categories with optional filtering and sorting.
        Returns category data in both English and Arabic.
      authenticated: false
      deprecated: false
    headers:
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters:
      search:
        custom: []
        name: search
        description: 'Search categories by name or description.'
        required: false
        example: coffee
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
      sort_by:
        custom: []
        name: sort_by
        description: 'Sort field (name, created_at).'
        required: false
        example: name
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
      sort_direction:
        custom: []
        name: sort_direction
        description: 'Sort direction (asc, desc). Default: asc.'
        required: false
        example: desc
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
      per_page:
        custom: []
        name: per_page
        description: 'Number of items per page. Default: 15.'
        required: false
        example: 10
        type: integer
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
    cleanQueryParameters:
      search: coffee
      sort_by: name
      sort_direction: desc
      per_page: 10
    bodyParameters: []
    cleanBodyParameters: []
    fileParameters: []
    responses:
